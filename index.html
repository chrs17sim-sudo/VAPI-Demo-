<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Vapi Demo</title>
    <style>
      body { font-family: system-ui, Arial; padding: 24px; }
      button { font-size: 18px; padding: 12px 16px; margin-right: 8px; }
      #status { margin-top: 12px; }
    </style>
  </head>
  <body>
    <h2>Walaa Demo Claims (AR)</h2>
    <button id="start">Start voice demo</button>
    <button id="stop" disabled>Stop</button>
    <div id="status">Status: idle</div>

    <script type="module">
      import Vapi from "https://cdn.skypack.dev/@vapi-ai/web";

      // 1) Paste your PUBLIC key from Vapi Dashboard → API Keys
      const PUBLIC_KEY = "ae2f0fd9-dc5c-4cbd-b6bd-b7ace9ba6eb0";

      // 2) Your saved assistant
      const ASSISTANT_ID = "20d6b459-5199-4bbd-b1df-9a8cf169aa99";

      const vapi = new Vapi(PUBLIC_KEY);

      const statusEl = document.getElementById("status");
      const startBtn = document.getElementById("start");
      const stopBtn = document.getElementById("stop");

      const setStatus = (s) => (statusEl.textContent = `Status: ${s}`);

      startBtn.onclick = async () => {
        setStatus("requesting microphone...");
        startBtn.disabled = true;

        try {
          await vapi.start(ASSISTANT_ID);
          setStatus("in call");
          stopBtn.disabled = false;
        } catch (e) {
          console.error(e);
          setStatus("failed to start (check mic permissions / key)");
          startBtn.disabled = false;
        }
      };

      stopBtn.onclick = () => {
        vapi.stop();
        setStatus("ended");
        stopBtn.disabled = true;
        startBtn.disabled = false;
      };

      vapi.on("call-start", () => setStatus("connected"));
      vapi.on("call-end", () => setStatus("ended"));
      vapi.on("error", (e) => {
        console.error(e);
        setStatus("error (see console)");
      });
    </script>
  </body>
</html>
